<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="/Materials/poyoroom.png">
    <title>ぽよルーム</title>
    <!--スタイルを適応させる-->
    <link rel="stylesheet" href="/Scripts/Games/GamesStyle.css">
    <link rel="stylesheet" href="/Scripts/Menu/MenuStyle.css">
    
    <!--表示設定-->
    <meta property="og:title" content="ぽよルーム">
    <meta property="og:description" content="">
    <meta property="og:image" content="">
    <meta property="og:url" content="https://poyoroom.github.io/">
    <meta property="og:type" content="website">
    <!--設定-->
    <meta name="viewport" content="width=device-width, initial-space=1.0">
</head>
<body>
    <div class="main">
        <!--上の帯部分-->
        <div class="menu">
            <!--帯ボックス-->
            <tai>
                <!--ぽよルームアイコン-->
                <a class="poyoroomIcon" href="/index.html">
                    <img src="/Materials/poyoroom.png" id="poyoroomIcon">
                </a>
                <!--タイトル-->
                <a id="title" href="/index.html">ぽよルーム</a>
                <!--リンク-->
                <div class="links">
                    <p id="home" onclick="location.href='/index.html'">ホーム</p>
                    <p id="games" style="color: yellow">ゲーム一覧</p>
                    <p id="report" onclick="location.href='/Scripts/Report/Report.html'">問い合わせ</p>
                    <p id="profile" onclick="location.href='/Scripts/Profile/Profile.html'">プロフィール</p>
                </div>
                <!--スマホモードで表示するメニューアイコン-->
                <div class="linkIcon">
                    <img src="/Materials/menu.png" id="menuIcon" onclick="MenuBotton()">
                </div>
            </tai>
            <!--スマホモードで表示されるメニュー-->
            <hid id="hiddenLinks">
                <p id="home" onclick="location.href='/index.html'">ホーム</p>
                <p id="games" style="color: yellow">ゲーム一覧</p>
                <p id="report" onclick="location.href='/Scripts/Report/Report.html'">問い合わせ</p>
                <p id="profile" onclick="location.href='/Scripts/Profile/Profile.html'">プロフィール</p>
            </hid>
        </div>
        <!--ゲーム表示エリア-->
        <div class="gamesArea" id="gamesArea"></div>
        <!--レビュー画面-->
        <div class="reviewArea"  id="reviewArea">
            <!--レビューカード-->
            <div class="reviewCard">
                <!--閉じるボタン-->
                <div class="close" onclick="CloseReviewBtn()">✖</div>
                <p>レビュー</p>
                <!--ゲームのタイトルを表示-->
                <div class="reviewGameTitle" id="reviewGameTitle"></div>
                <!--評価-->
                <div class="review" id="review">
                    <p>評価:</p>
                    <div class="stars">
                        <div id="star1" onclick="ReviwScore(1)">★</div>
                        <div id="star2" onclick="ReviwScore(2)">☆</div>
                        <div id="star3" onclick="ReviwScore(3)">☆</div>
                        <div id="star4" onclick="ReviwScore(4)">☆</div>
                        <div id="star5" onclick="ReviwScore(5)">☆</div>
                    </div>
                </div>
                <!--コメント-->
                <div class="comment">
                    <p>コメント(任意)</p>
                    <textarea id="reviewComment"></textarea>
                </div>
                <div class="sendBtn">
                    <button onclick="SendReview()">送信</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/Scripts/Games/GamesSystem.js"></script>
    <script src="/Scripts/Menu/Menu.js"></script>
</body>
</html>
