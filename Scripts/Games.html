<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="/Materials/poyoroom.png">
        <title>ぽよルーム</title>
        <!--スタイルを適応させる-->
        <link rel="stylesheet" href="/Scripts/GamesStyle.css">
        <link rel="stylesheet" href="/Scripts/MenuStyle.css">
        
        <!--表示設定-->
        <meta property="og:title" content="ぽよルーム">
        <meta property="og:description" content="">
        <meta property="og:image" content="">
        <meta property="og:url" content="https://poyoroom.github.io/">
        <meta property="og:type" content="website">
        <!--設定-->
        <meta name="viewport" content="width=device-width, initial-space=1.0">
    </head>

    <body>
        <div class="main">
            <!--上の帯部分-->
            <div class="menu">
                <!--帯ボックス-->
                <tai>
                    <!--ぽよルームアイコン-->
                    <a class="poyoroomIcon" href="/index.html">
                        <img src="/Materials/poyoroom.png" id="poyoroomIcon">
                    </a>
                    <!--タイトル-->
                    <a id="title" href="/index.html">ぽよルーム</a>
                    <!--リンク-->
                    <div class="links">
                        <p id="home" onclick="location.href='/index.html'">ホーム</p>
                        <p id="games" style="color: yellow">ゲーム一覧</p>
                        <p id="report">問い合わせ</p>
                        <p id="profile">プロフィール</p>
                    </div>
                    <!--スマホモードで表示するメニューアイコン-->
                    <div class="linkIcon">
                        <img src="/Materials/menu.png" id="menuIcon" onclick="MenuBotton()">
                    </div>
                </tai>
                <!--スマホモードで表示されるメニュー-->
                <hid id="hiddenLinks">
                    <p id="home" onclick="location.href='/index.html'">ホーム</p>
                    <p id="games" style="color: yellow">ゲーム一覧</p>
                    <p id="report">問い合わせ</p>
                    <p id="profile">プロフィール</p>
                </hid>
            </div>
            <!--ゲーム表示エリア-->
            <div class="gamesArea" id="gamesArea"></div>
        </div>
        
        <script src="/Scripts/GamesSystem.js"></script>
        <script src="/Scripts/Menu.js"></script>
    </body>
</html>
